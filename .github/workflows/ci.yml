name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.qrec/models/
          key: embeddinggemma-300M-Q8_0-v2

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun tsc --noEmit

      - name: Build
        run: node scripts/build.js

      - name: Verify build artifact
        run: test -f plugin/scripts/qrec.cjs

      - name: Register qrec globally
        run: bun link

      - name: Seed fixture sessions
        run: |
          mkdir -p ~/.claude/projects/ci-fixtures
          cp eval/fixtures/sessions/*.jsonl ~/.claude/projects/ci-fixtures/

      - name: Install Homebrew SQLite (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install sqlite

      # Integration test: onboard (model + index + daemon) → search → activity → cron auto-index
      - name: Integration test
        env:
          QREC_INDEX_INTERVAL_MS: 5000
        run: |
          # First-time setup: loads model, indexes fixtures, starts daemon
          qrec onboard --no-open

          echo "Waiting for search to be ready (model loading in daemon)..."
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:25729/search \
              -H 'Content-Type: application/json' -d '{"query":"sqlite","k":3}')
            [ "$status" = "200" ] && break
            echo "  attempt $i: status=$status, retrying in 5s..."
            sleep 5
          done

          echo "Search: verifying results..."
          curl -sf -X POST http://localhost:25729/search \
            -H 'Content-Type: application/json' \
            -d '{"query":"sqlite","k":3}' | jq -e '.results | length > 0'
          echo "Search: OK"

          echo "Activity: verifying daemon events logged..."
          curl -sf http://localhost:25729/activity/entries | jq -e '.entries | length > 0'
          echo "Activity: OK"

          echo "Cron: adding new session with unique session_id..."
          # Filename prefix = session_id (8-char hex). Use a unique name not in the DB.
          cat > ~/.claude/projects/ci-fixtures/f1f1f1f1-cron-test.jsonl << 'EOF'
          {"type":"user","isMeta":false,"isSidechain":false,"message":{"role":"user","content":"How does the cron auto-index work in qrec?"},"cwd":"/home/user/myproject","timestamp":"2024-06-01T10:00:00.000Z"}
          {"type":"assistant","isMeta":false,"isSidechain":false,"message":{"role":"assistant","content":"The daemon runs setInterval to call indexVault incrementally every minute."},"timestamp":"2024-06-01T10:00:01.000Z"}
          {"type":"user","isMeta":false,"isSidechain":false,"message":{"role":"user","content":"Does it skip unchanged files?"},"cwd":"/home/user/myproject","timestamp":"2024-06-01T10:00:02.000Z"}
          {"type":"assistant","isMeta":false,"isSidechain":false,"message":{"role":"assistant","content":"Yes, an mtime pre-filter skips files not modified since indexed_at."},"timestamp":"2024-06-01T10:00:03.000Z"}
          EOF

          echo "Cron: waiting up to 20s for incremental index to pick up new session..."
          for i in $(seq 1 4); do
            sleep 5
            found=$(curl -sf http://localhost:25729/sessions | jq '[.sessions[] | select(.id == "f1f1f1f1")] | length')
            if [ "$found" = "1" ]; then
              echo "Cron: new session f1f1f1f1 indexed after ~$((i * 5))s — OK"
              break
            fi
            echo "  attempt $i: not indexed yet..."
          done
          [ "$found" = "1" ] || { echo "FAIL: cron did not index new session within 20s"; exit 1; }

          qrec stop
          echo "Integration test: PASSED"

      # MCP stdio round-trip — stub embed, no model load needed
      - name: MCP round-trip
        env:
          QREC_EMBED_PROVIDER: stub
        run: |
          printf '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}},"id":1}\n{"jsonrpc":"2.0","method":"initialized","params":{}}\n{"jsonrpc":"2.0","method":"tools/list","id":2}\n' \
            | qrec mcp \
            | grep -q '"search"'
          echo "MCP tools/list: OK"

      # Verify npm distribution: pack → global install → CLI works
      - name: npm distribution path
        run: npm pack && npm install -g ./dvquys-qrec-*.tgz && qrec --version
