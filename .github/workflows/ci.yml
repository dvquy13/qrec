name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Node only — no setup-bun. Bun is installed by smart-install.js (step below),
      # simulating a real new-user machine where only Node is pre-installed.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.qrec/models/
          key: embeddinggemma-300M-Q8_0-v2

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Seed fixture sessions
        run: |
          mkdir -p ~/.claude/projects/ci-fixtures
          cp eval/fixtures/sessions/*.jsonl ~/.claude/projects/ci-fixtures/

      # Test the SessionStart hook exactly as Claude Code invokes it:
      # pipe the event JSON to smart-install.js with CLAUDE_PLUGIN_ROOT set.
      # This is the official Anthropic hook testing pattern (no API key needed).
      # Exercises: Bun install, bun install in plugin/, bun link, model download, first-time index.
      - name: Test SessionStart hook (smart-install.js)
        run: |
          printf '{"session_id":"ci","transcript_path":"/tmp/t","cwd":"/tmp","permission_mode":"ask","hook_event_name":"SessionStart"}' \
            | CLAUDE_PLUGIN_ROOT=${{ github.workspace }}/plugin \
              node plugin/scripts/smart-install.js

      # CI-only: bun.sh/install modifies ~/.zshrc but that doesn't affect the current job.
      # Real users get ~/.bun/bin in PATH automatically on next shell open.
      - name: Add Bun to PATH
        run: echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun tsc --noEmit

      - name: Build
        run: node scripts/build.js

      - name: Verify build artifact
        run: test -f plugin/scripts/qrec.cjs

      - name: Install Homebrew SQLite (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install sqlite

      # Test the plugin distribution path: MCP via bun-runner.js → qrec.cjs.
      # Uses stub embed so no model load needed for a tools/list check.
      - name: MCP round-trip via plugin path
        env:
          QREC_EMBED_PROVIDER: stub
        run: |
          printf '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}},"id":1}\n{"jsonrpc":"2.0","method":"initialized","params":{}}\n{"jsonrpc":"2.0","method":"tools/list","id":2}\n' \
            | node plugin/scripts/bun-runner.js plugin/scripts/qrec.cjs mcp \
            | grep -q '"search"'
          echo "MCP tools/list: OK"

      # Uses real model. Server now binds immediately (Bun.serve before getEmbedProvider),
      # so /health responds at once. Poll /search until model is ready (exits 503 while loading).
      - name: Integration test — serve + search + audit
        run: |
          qrec serve --daemon
          curl -sf http://localhost:3030/health
          echo "Waiting for model to load..."
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3030/search \
              -H 'Content-Type: application/json' -d '{"query":"sqlite","k":3}')
            [ "$status" = "200" ] && break
            echo "  attempt $i: status=$status, retrying in 5s..."
            sleep 5
          done
          curl -sf -X POST http://localhost:3030/search \
            -H 'Content-Type: application/json' \
            -d '{"query":"sqlite","k":3}' | jq -e '.results | length > 0'
          curl -sf http://localhost:3030/audit/entries | jq -e '.entries | length >= 0'
          qrec stop

      # Regression: bun-runner.js must not hang when stdin is never closed.
      # Placed after integration test (which ends with qrec stop) so the daemon state is clean.
      # Simulates Claude Code hook environment: stdin is an open pipe that never sends EOF.
      # bun-runner.js used to block on stdin.on('end') indefinitely — SessionStart hook error.
      # After fix: detects serve --daemon and exits immediately without touching stdin.
      - name: "Regression: bun-runner serve --daemon must not hang with open stdin"
        env:
          QREC_EMBED_PROVIDER: stub
        run: |
          node -e "
            const { spawn } = require('child_process');
            const child = spawn('node', [
              'plugin/scripts/bun-runner.js',
              'plugin/scripts/qrec.cjs',
              'serve', '--daemon'
            ], { stdio: ['pipe', 'pipe', 'pipe'] });
            child.stdout.on('data', d => process.stdout.write(d));
            child.stderr.on('data', d => process.stderr.write(d));
            const t = setTimeout(() => {
              process.stderr.write('FAIL: bun-runner.js hung 10s with stdin open — SessionStart hook bug confirmed\n');
              child.kill();
              process.exit(1);
            }, 10000);
            child.on('exit', code => { clearTimeout(t); process.exit(code || 0); });
          "
          qrec stop || true

      # Verify the npm distribution path: pack → global install → CLI works.
      - name: npm distribution path
        run: npm pack && npm install -g ./qrec-*.tgz && qrec --version
