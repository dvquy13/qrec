<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Punch a transparent hole through the ring -->
    <mask id="ring-mask">
      <rect width="512" height="512" fill="white"/>
      <circle cx="248" cy="248" r="82" fill="black"/>
    </mask>
  </defs>
  <!-- Halos + ring, all masked so the center is transparent -->
  <g mask="url(#ring-mask)">
    <circle cx="248" cy="248" r="220" fill="#0062a8" fill-opacity="0.06"/>
    <circle cx="248" cy="248" r="174" fill="#0062a8" fill-opacity="0.15"/>
    <circle cx="248" cy="248" r="138" fill="#0062a8"/>
  </g>
  <!-- Handle (outside mask — not affected by hole) -->
  <line x1="346" y1="346" x2="484" y2="484" stroke="#0062a8" stroke-width="41" stroke-linecap="round"/>
</svg>
