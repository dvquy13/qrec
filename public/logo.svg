<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="container">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  <!-- White rounded-square container -->
  <rect width="512" height="512" rx="112" ry="112" fill="#ffffff"/>
  <g clip-path="url(#container)">
    <!-- Outer ambient halo -->
    <circle cx="248" cy="248" r="220" fill="#0062a8" fill-opacity="0.06"/>
    <!-- Mid halo -->
    <circle cx="248" cy="248" r="174" fill="#0062a8" fill-opacity="0.15"/>
    <!-- Ring: solid outer + white hole -->
    <circle cx="248" cy="248" r="138" fill="#0062a8"/>
    <circle cx="248" cy="248" r="82"  fill="#ffffff"/>
    <!-- Handle -->
    <line x1="346" y1="346" x2="484" y2="484" stroke="#0062a8" stroke-width="41" stroke-linecap="round"/>
  </g>
</svg>
