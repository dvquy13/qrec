<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="container">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  <!-- Dark rounded-square container -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0f172a"/>
  <g clip-path="url(#container)">
    <!-- Outer ambient halo -->
    <circle cx="248" cy="248" r="220" fill="#3399cc" fill-opacity="0.07"/>
    <!-- Mid halo -->
    <circle cx="248" cy="248" r="174" fill="#3399cc" fill-opacity="0.18"/>
    <!-- Ring: solid outer + dark hole -->
    <circle cx="248" cy="248" r="138" fill="#3399cc"/>
    <circle cx="248" cy="248" r="82"  fill="#0f172a"/>
    <!-- Handle -->
    <line x1="346" y1="346" x2="484" y2="484" stroke="#3399cc" stroke-width="41" stroke-linecap="round"/>
  </g>
</svg>
