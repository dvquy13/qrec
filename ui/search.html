<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qrec — Session Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: #2e3347;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --score: #10b981;
    --tag: #334155;
    --tag-text: #94a3b8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header a {
    margin-left: auto;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
  }

  header a:hover { color: var(--accent-hover); }

  .logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: white;
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .search-bar input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-muted); }

  .search-bar button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .search-bar button:hover { background: var(--accent-hover); }
  .search-bar button:disabled { opacity: 0.5; cursor: default; }

  .k-input {
    width: 72px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 10px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    text-align: center;
  }

  .k-input:focus { border-color: var(--accent); }

  .latency-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .latency-bar span { display: flex; align-items: center; gap: 4px; }
  .latency-bar strong { color: var(--text); }

  .results { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .card:hover { border-color: var(--accent); background: var(--bg3); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-meta {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-subtitle {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    background: var(--tag);
    color: var(--tag-text);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }

  .score {
    color: var(--score);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .preview {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .expanded .preview {
    -webkit-line-clamp: unset;
    display: block;
  }

  .expanded-body {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .expanded .expanded-body { display: block; }

  .expanded-body pre {
    font-size: 12px;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
    background: var(--bg);
    border-radius: 6px;
    padding: 12px;
  }

  .empty-state, .error-state {
    text-align: center;
    color: var(--text-muted);
    padding: 48px 0;
    font-size: 15px;
  }

  .error-state { color: #f87171; }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="logo">q</div>
  <h1>qrec</h1>
  <a href="/audit">Audit log →</a>
</header>

<main>
  <div class="search-bar">
    <input type="text" id="query" placeholder="Search sessions..." autofocus>
    <input type="number" id="k" class="k-input" value="10" min="1" max="50" title="Results (k)">
    <button id="search-btn" onclick="doSearch()">Search</button>
  </div>

  <div id="latency-bar" class="latency-bar" style="display:none;"></div>
  <div id="results" class="results"></div>
</main>

<script>
  const queryEl = document.getElementById('query');
  const resultsEl = document.getElementById('results');
  const latencyEl = document.getElementById('latency-bar');
  const btn = document.getElementById('search-btn');

  queryEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const query = queryEl.value.trim();
    if (!query) return;

    const k = parseInt(document.getElementById('k').value, 10) || 10;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    resultsEl.innerHTML = '';
    latencyEl.style.display = 'none';

    try {
      const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, k }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        showError(err.error ?? 'Search failed');
        return;
      }

      const { results } = await res.json();

      if (!results || results.length === 0) {
        resultsEl.innerHTML = '<div class="empty-state">No results found.</div>';
        return;
      }

      // Show latency from first result
      const lat = results[0].latency;
      latencyEl.style.display = 'flex';
      latencyEl.innerHTML = `
        <span>BM25 <strong>${lat.bm25Ms.toFixed(1)}ms</strong></span>
        <span>Embed <strong>${lat.embedMs.toFixed(1)}ms</strong></span>
        <span>KNN <strong>${lat.knnMs.toFixed(1)}ms</strong></span>
        <span>Fusion <strong>${lat.fusionMs.toFixed(1)}ms</strong></span>
        <span>Total <strong>${lat.totalMs.toFixed(1)}ms</strong></span>
        <span>${results.length} results</span>
      `;

      resultsEl.innerHTML = results.map((r, i) => `
        <div class="card" onclick="toggleCard(this, ${i})" data-session="${r.session_id}">
          <div class="card-header">
            <div class="card-meta">
              <div class="card-title">${escHtml(r.title || r.session_id)}</div>
              <div class="card-subtitle">
                <span class="tag">${escHtml(r.project)}</span>
                <span class="tag">${escHtml(r.date)}</span>
                <span class="tag">${r.session_id}</span>
              </div>
            </div>
            <div class="score">${r.score.toFixed(4)}</div>
          </div>
          <div class="preview">${escHtml(r.preview)}</div>
          <div class="expanded-body">
            <pre>Loading...</pre>
          </div>
        </div>
      `).join('');

    } catch (err) {
      showError(String(err));
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  function showError(msg) {
    resultsEl.innerHTML = `<div class="error-state">Error: ${escHtml(msg)}</div>`;
  }

  async function toggleCard(card, idx) {
    card.classList.toggle('expanded');
    if (card.classList.contains('expanded')) {
      const pre = card.querySelector('pre');
      const sessionId = card.dataset.session;
      if (pre.textContent === 'Loading...') {
        try {
          const res = await fetch('/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: queryEl.value.trim(), k: 1 }),
          });
          // For preview, show the chunk preview from the result since we don't have a /get endpoint in search.html
          // We'll use the preview already fetched; for full content show a note
          pre.textContent = card.querySelector('.preview').textContent + '\n\n[Full session content available via API: GET /sessions/' + sessionId + ']';
        } catch {
          pre.textContent = 'Failed to load session content.';
        }
      }
    }
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
