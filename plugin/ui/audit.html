<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qrec — Audit Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f8fafc;
    --bg3: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --accent: #0062a8;
    --accent-hover: #004d84;
    --score: #059669;
    --red: #dc2626;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  nav {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 6px;
    transition: background 0.1s, color 0.1s;
  }

  nav a:hover { background: var(--bg3); color: var(--text); }
  nav a.active { background: var(--bg3); color: var(--text); }

  .logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .toolbar h2 {
    font-size: 16px;
    font-weight: 600;
  }

  .badge {
    background: var(--bg3);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  .auto-refresh {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--score);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg2);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  thead { background: var(--bg3); }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    font-variant-numeric: tabular-nums;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(99, 102, 241, 0.03); }

  .query-cell {
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .session-id {
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .score { color: var(--score); font-weight: 600; }
  .duration { color: var(--text-muted); }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 64px 0;
    font-size: 15px;
  }

  .error-state {
    text-align: center;
    color: var(--red);
    padding: 48px 0;
  }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="logo">q</div>
  <h1>qrec</h1>
  <nav>
    <a href="/">Status</a>
    <a href="/search">Search</a>
    <a href="/audit" class="active">Audit</a>
    <a href="/debug">Debug</a>
  </nav>
</header>

<main>
  <div class="toolbar">
    <h2>Audit Log</h2>
    <span class="badge" id="count-badge">—</span>
    <div class="auto-refresh">
      <div class="dot"></div>
      Auto-refreshes every 30s
    </div>
  </div>

  <div id="content">
    <div class="empty-state"><span class="spinner"></span></div>
  </div>
</main>

<script>
  async function loadAudit() {
    try {
      const res = await fetch('/audit/entries?limit=200');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { entries } = await res.json();

      const badge = document.getElementById('count-badge');
      const content = document.getElementById('content');

      badge.textContent = String(entries.length);

      if (entries.length === 0) {
        content.innerHTML = '<div class="empty-state">No queries yet.</div>';
        return;
      }

      const rows = entries.map(e => `
        <tr>
          <td>${formatDate(e.created_at)}</td>
          <td class="query-cell" title="${escHtml(e.query)}">${escHtml(e.query)}</td>
          <td>${e.k}</td>
          <td>${e.result_count}</td>
          <td class="session-id">${e.top_session_id ? escHtml(e.top_session_id) : '—'}</td>
          <td class="score">${e.top_score != null ? e.top_score.toFixed(4) : '—'}</td>
          <td class="duration">${e.duration_ms.toFixed(1)}ms</td>
        </tr>
      `).join('');

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Query</th>
              <th>k</th>
              <th>Results</th>
              <th>Top Session</th>
              <th>Top Score</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      document.getElementById('content').innerHTML =
        `<div class="error-state">Failed to load audit log: ${escHtml(String(err))}</div>`;
    }
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleString(undefined, {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadAudit();
  setInterval(loadAudit, 30_000);
</script>
</body>
</html>
